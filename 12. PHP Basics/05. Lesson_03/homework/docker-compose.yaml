services:
  webserver:
    image: nginx:latest
    container_name: homework_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - socket-volume:/tmp
    depends_on:
      - app-fpm

  app-fpm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homework_fpm
    volumes:
      - ./:/var/www/html
      - ./zz-docker.conf:/usr/local/etc/php-fpm.d/zz-docker.conf
      - socket-volume:/tmp

  app-cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homework_cli
    volumes:
      - ./:/cli
    working_dir: /cli

volumes:
  socket-volume:
