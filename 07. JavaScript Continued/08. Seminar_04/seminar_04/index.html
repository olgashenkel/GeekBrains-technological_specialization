      /* Оформление стиля для Задания № 1 */
      .error {
        font-style: italic;
        font-weight: bold;
        color: #ff5733;
      }

      .error-check {
        appearance: none;
        border: 5px solid red;
        border-radius: 2px;
        margin: 3px 3px 0px 4px;
        border: 1px solid red;
        width: 13px;
        height: 13px;
        border-color: #ff5733;

        &:checked {
          appearance: auto;
          accent-color: #ff5733;
        }
      }

      .error-input {
        border: 1px solid red;
      }

      .correct-input {
        background-color: green;
      }

      /* Оформление стиля для Задания № 3 */
      [aria-invalid] {
        border: 3px solid red;
      }

      [role="alert"] {
        background-color: #ffcccc;
        width: 200px;
        text-align: center;
        font-weight: bold;
        padding: 5px;
        border: 1px dashed #000;
      }

      div {
        margin: 10px 0;
        padding: 5px;
        width: 400px;
        background-color: #ffffff;
      }
    </style>
